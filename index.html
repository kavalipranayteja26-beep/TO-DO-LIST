<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Day Planner & Habits</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap');
    </style>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <div id="app">
      <!-- Setup Screen (shown if no plan exists for tomorrow/today) -->
      <section id="setup-screen" class="screen hidden">
        <div class="glass-panel wizard-container">
          <div class="buddy-header">
            <div class="buddy-icon">🌿</div>
            <div class="buddy-message" id="buddy-bubble">Hi! Let's get you ready for tomorrow. What's the main task on your mind?</div>
          </div>
          
          <div id="step-tasks" class="wizard-step">
            <div class="input-row">
              <input type="text" id="task-name" placeholder="E.g., Morning workout" />
              <input type="time" id="task-time" />
              <button id="add-task-btn" class="btn-primary">+</button>
            </div>
            <ul id="setup-task-list" class="task-list"></ul>
            <button class="btn-secondary next-step" data-next="step-meds">Next: Medications →</button>
          </div>

          <div id="step-meds" class="wizard-step hidden">
            <div class="input-row">
              <input type="text" id="med-name" placeholder="Vitamin C" />
              <input type="time" id="med-time" />
              <button id="add-med-btn" class="btn-primary">+</button>
            </div>
            <ul id="setup-med-list" class="task-list"></ul>
            <div class="wizard-buttons">
              <button class="btn-text prev-step" data-prev="step-tasks">← Back</button>
              <button class="btn-secondary next-step" data-next="step-water">Next: Hydration →</button>
            </div>
          </div>

          <div id="step-water" class="wizard-step hidden">
            <div class="form-group center-content">
              <label>How many glasses of water should we aim for?</label>
              <input type="number" id="water-goal" value="8" min="1" max="15" class="large-input" />
            </div>
            <div class="wizard-buttons">
              <button class="btn-text prev-step" data-prev="step-meds">← Back</button>
              <button id="save-plan-btn" class="btn-success">Finalize My Day! ✨</button>
            </div>
          </div>
        </div>
      </section>

      <!-- Dashboard Screen -->
      <section id="dashboard-screen" class="screen hidden">
        <header>
          <h1>Today's Overview</h1>
          <button id="reset-plan-btn" class="btn-icon">↺ Reset</button>
        </header>

        <div class="progress-container">
          <div class="progress-ring">
            <svg viewBox="0 0 36 36" class="circular-chart green">
              <path class="circle-bg"
                d="M18 2.0845
                  a 15.9155 15.9155 0 0 1 0 31.831
                  a 15.9155 15.9155 0 0 1 0 -31.831"
              />
              <path class="circle" id="overall-progress"
                stroke-dasharray="0, 100"
                d="M18 2.0845
                  a 15.9155 15.9155 0 0 1 0 31.831
                  a 15.9155 15.9155 0 0 1 0 -31.831"
              />
              <text x="18" y="20.35" class="percentage" id="progress-text">0%</text>
            </svg>
          </div>
        </div>

        <div class="dashboard-grid">
          <div class="card glass-panel section-tasks">
            <h2>To-Do List</h2>
            <ul id="dashboard-task-list" class="task-list"></ul>
          </div>
          
          <div class="card glass-panel section-habits">
            <h2>Habits</h2>
            <div class="water-tracker">
              <h3>Water Intake</h3>
              <div id="water-glasses" class="glass-container"></div>
            </div>
            
            <div class="med-tracker">
              <h3>Medicine</h3>
              <ul id="dashboard-med-list" class="task-list"></ul>
            </div>
          </div>
        </div>
      </section>
    </div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
